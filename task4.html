<html>
    <head>
        <script>
            let size=50
            let i
            function fun(size){
                document.getElementById("p").style.fontSize=size+"px"
            }
            function fun1(){
                 clearInterval(i)
                 i=setInterval(()=>{
                    if(size<=200){
                    fun(size++)
                    }
                 },100)
            }
            function fun2(){
            clearInterval(i)
                i=setInterval(()=>{
                    if(size>=20){
                    fun(size--)
                    }
                },100)
                
            }
            function stop(){
                clearInterval(i)
            }
            
        </script>
    </head>
    <body>
         <button onclick="fun1()">Increase</button>
         <p id="p" style="color: blue; font-size: 50px;">hello</p>
          <button onclick="fun2()">Decrease</button>
           <button onclick="stop()">Stop</button>
    </body>
</html>
