<!-- initialize two vaRIABLES AND INCREMENT BOTH THE VARIABLE EACH TIME AND 
 DISPLAY THE ADDITION OF BOTH THE VARIABLES AT INTERVAL OF 1 SEC  && 5 time iteration -->
 <HTML>
    <head>
    <script>
       let a=3
       let b=5
       let c=0
      const i= setInterval (()=>{
        document.getElementById("p").innerHTML=a+b
        a+=1
        b+=1
        c++
        if(c===5){
            clearInterval(i)

        }

       },2000)
    </script>
    </head>
    <body>
      <p id="p">hello</p>
    </body>
 </HTML>
